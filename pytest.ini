[pytest]
# Pytest Configuration for Database Sanitization Project
# Author: Database Sanitization Team
# Date: 2026-03-27

# ============================================================================
# TEST DISCOVERY
# ============================================================================
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests/unit tests/integration

# ============================================================================
# TEST MARKERS
# ============================================================================
markers =
    unit: Unit tests (fast, isolated, mocked dependencies)
    integration: Integration tests (slower, real database connections)
    slow: Slow tests that may take >5 seconds
    smoke: Smoke tests for CI/CD quick validation
    regression: Regression tests for known bug fixes
    security: Security-focused tests (encryption, PII handling)
    edge_case: Edge case and boundary condition tests

# ============================================================================
# COVERAGE SETTINGS
# ============================================================================
addopts =
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --cov-branch
    -v
    --strict-markers
    --tb=short
    --maxfail=5

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s (%(filename)s:%(lineno)d) - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ============================================================================
# OUTPUT FORMATTING
# ============================================================================
console_output_style = progress
junit_family = xunit2

# ============================================================================
# WARNING FILTERS
# ============================================================================
filterwarnings =
    error::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::UserWarning:faker

# ============================================================================
# TIMEOUT SETTINGS (requires pytest-timeout)
# ============================================================================
timeout = 300
timeout_method = thread

# ============================================================================
# PARALLEL EXECUTION (requires pytest-xdist)
# ============================================================================
# Uncomment to enable parallel test execution:
# addopts = -n auto

# ============================================================================
# MINIMUM PYTHON VERSION
# ============================================================================
minversion = 7.0
